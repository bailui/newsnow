services:
  newsnow:
    build: .
    ports:
      - '4444:4444'
    volumes:
      - bailuio_news_data:/usr/app/.data
    environment:
      - G_CLIENT_ID=
      - G_CLIENT_SECRET=
      - JWT_SECRET=
      - INIT_TABLE=true
      - ENABLE_CACHE=true

volumes:
  bailuio_news_data:
    name: bailuio_news_data